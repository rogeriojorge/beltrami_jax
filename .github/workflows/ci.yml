name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package and dev dependencies
        run: |
          for attempt in 1 2 3; do
            python -m pip install --retries 10 --timeout 60 -e '.[dev]' && break
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep 5
          done

      - name: Run tests
        run: python -m pytest

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install build dependency
        run: python -m pip install build

      - name: Build source and wheel distributions
        run: python -m build

  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package and docs dependencies
        run: |
          for attempt in 1 2 3; do
            python -m pip install --retries 10 --timeout 60 -r docs/requirements.txt && \
            python -m pip install --retries 10 --timeout 60 -e . && break
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep 5
          done

      - name: Build documentation
        run: python -m sphinx -W -b html docs docs/_build/html
